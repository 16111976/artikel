server {
    listen 6000 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /sw.js {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|svg|png|jpg|jpeg|webp|ico|json|webmanifest|md)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # DWDS-Proxy: CORS umgehen (längeres Präfix zuerst)
    location /api/dwds/ {
        proxy_pass https://www.dwds.de/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.dwds.de;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend-API (Wörter aus MySQL). Variable = Auflösung zur Laufzeit, Nginx startet auch wenn API noch nicht läuft.
    location /api/ {
        set $api_upstream derdiedas-api:6001;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        resolver 127.0.0.11 valid=10s;
    }
}
